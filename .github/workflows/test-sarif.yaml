name: Apply

on:
  push:
    branches:
      - main

jobs:
  upload-sarif:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: example.sarif
